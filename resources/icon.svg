<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Outer glow -->
  <path d="M64 16 L104 34 L104 62 C104 86 86 106 64 114 C42 106 24 86 24 62 L24 34 Z" 
        fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.3"/>
  <!-- Shield body -->
  <path d="M64 22 L98 38 L98 62 C98 82 82 100 64 108 C46 100 30 82 30 62 L30 38 Z" 
        fill="url(#shield)" opacity="0.85"/>
  <!-- Shield inner -->
  <path d="M64 28 L92 42 L92 62 C92 78 78 94 64 102 C50 94 36 78 36 62 L36 42 Z" 
        fill="url(#bg)" opacity="0.7"/>
  <!-- Lock body -->
  <rect x="52" y="60" width="24" height="20" rx="3" fill="url(#lock)"/>
  <!-- Lock shackle -->
  <path d="M56 60 L56 52 C56 44 72 44 72 52 L72 60" 
        fill="none" stroke="url(#lock)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="64" cy="68" r="3" fill="#1a1a2e"/>
  <rect x="63" y="70" width="2" height="5" rx="1" fill="#1a1a2e"/>
  <!-- Code brackets -->
  <text x="38" y="56" font-family="monospace" font-size="16" font-weight="bold" fill="#00d2ff" opacity="0.6">&lt;</text>
  <text x="84" y="56" font-family="monospace" font-size="16" font-weight="bold" fill="#00d2ff" opacity="0.6">/&gt;</text>
</svg>
